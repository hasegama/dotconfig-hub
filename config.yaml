# dotconfig-hub template configuration
#
# File entry formats:
#   - string: "path/to/file"  (always synced)
#   - dict:   { path: "file", init_only: true }  (synced only on first setup)
#   - dict:   { source: "hub_name", target: "project_name" }  (rename on delivery)
#   - dict:   { source: "hub_name", target: "project_name", init_only: true }
#
# Use init_only for files that each project will customize after initial delivery.
# Use source/target rename when the hub filename must differ from the project filename
# (e.g. .gitignore cannot be stored as-is in the hub because Git interprets it).
# Glob patterns (*.md, **/*.yml) are supported in string entries but NOT with rename.

environment_sets:
  # Complete project template
  my_project_init_template:
    description: "Complete project initialization template with development tools"
    tools:
      # Claude Code configuration
      claude_config:
        project_dir: my_project_init_template
        files:
          # CLAUDE.md is delivered once — each project customizes it
          - { path: CLAUDE.md, init_only: true }
          # Shared commands stay in sync across projects
          - .claude/commands/*.md
          # Permission settings stay consistent
          - .claude/settings.local.json

      # VS Code development environment
      vscode:
        project_dir: my_project_init_template
        files:
          - .vscode/settings.json
          - .vscode/extensions.json

      # GitHub configuration
      github:
        project_dir: my_project_init_template
        files:
          # Workflows stay in sync for improvements and security fixes
          - .github/workflows/*.yml
          - .github/dependabot.yml
          # Project templates are delivered once — each project customizes them
          - { path: ".github/ISSUE_TEMPLATE/1-bug-report.md", init_only: true }
          - { path: ".github/ISSUE_TEMPLATE/2-feature-request.md", init_only: true }
          - { path: ".github/PULL_REQUEST_TEMPLATE.md", init_only: true }

      # Git configuration
      git_config:
        project_dir: my_project_init_template
        files:
          # .gitignore is stored as .gitignore.hub in the hub to prevent Git
          # from interpreting it. Renamed to .gitignore on delivery to projects.
          - { source: .gitignore.hub, target: .gitignore, init_only: true }

  # Minimal project template for lightweight projects
  minimal_template:
    description: "Minimal project template with basic settings"
    tools:
      vscode:
        project_dir: minimal_template
        files:
          - .vscode/settings.json
      git_config:
        project_dir: minimal_template
        files:
          - { path: .gitignore, init_only: true }
